{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register - Curriculum Planner</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0d1f3d 0%, #1a3a6b 25%, #2c5aa0 50%, #3d6db8 75%, #4a7ec7 100%);
            min-height: 100vh;
            color: #333;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Advanced animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 15% 20%, rgba(255, 193, 7, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(255, 193, 7, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.08) 0%, transparent 50%);
            pointer-events: none;
            animation: particleFloat 25s ease-in-out infinite;
        }
        
        @keyframes particleFloat {
            0%, 100% { 
                transform: translateY(0) scale(1); 
                opacity: 1;
            }
            50% { 
                transform: translateY(-20px) scale(1.02); 
                opacity: 0.95;
            }
        }
        
        .header {
            background: linear-gradient(135deg, #2c5aa0 0%, #1a3a6b 50%, #0d1f3d 100%);
            color: white;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid rgba(255, 193, 7, 0.3);
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 193, 7, 0.3), transparent);
            animation: shimmer 4s infinite;
        }
        
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 800;
            text-shadow: 
                2px 2px 4px rgba(0,0,0,0.3),
                0 0 20px rgba(255, 193, 7, 0.4);
            position: relative;
            z-index: 1;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #ffffff 0%, #ffc107 50%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 4s linear infinite;
        }
        
        @keyframes textShine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }


        /* Logo Section */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-image {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.2));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .register-container {
             display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px);
            padding: 40px 20px;
        }
        .register-form {
             background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            padding: 60px 50px;
            width: 100%;
            max-width: 500px;
            box-shadow: 
                0 20px 80px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            animation: slideUp 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .register-form::before {
           content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            background: linear-gradient(45deg, 
                #2c5aa0, #ffc107, #2c5aa0, #ffc107);
            border-radius: 40px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
        }

        .register-form:hover::before {
            opacity: 0.7;
        }
        
        .register-title {
          background: linear-gradient(135deg, #2c5aa0 0%, #1a3a6b 30%, #2c5aa0 60%, #ffc107 80%, #2c5aa0 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2rem;
            font-weight: 900;
            margin: 20px 0 10px;
            animation: titleShine 5s linear infinite;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .register-subtitle {
          color: #555;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 500;
        }
        @keyframes titleShine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .form-group {
            margin-bottom: 20px;
        }
        label {
          display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: #2c5aa0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 16px 20px;
            border: 3px solid #e1e8ed;
            border-radius: 15px;
            font-size: 1rem;
            background: #e8f0fe ;
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #2c5aa0;
            box-shadow: 0 0 0 5px rgba(44, 90, 160, 0.15);
            transform: translateY(-2px);
        }

        .error-message {
            background: linear-gradient(135deg, #fee 0%, #fdd 100%);
            color: #c41e3a;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            border: 2px solid rgba(196, 30, 58, 0.3);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .register-btn {
            width: 100%;
            padding: 18px 50px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #2c5aa0 0%, #1a3a6b 50%, #0d1f3d 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(44, 90, 160, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            margin-top: 10px;
        }

        .register-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }

        .register-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .register-btn:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 40px rgba(44, 90, 160, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .register-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .register-btn:disabled:hover {
            transform: none;
        }
        
        .error {
            color: #dc2626;
            margin: 5px 0;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .success {
            color: #16a34a;
            margin-top: 15px;
            font-weight: 500;
            text-align: center;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #555;
            font-size: 0.95rem;
        }

        .login-link a {
            color: #2c5aa0;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: #ffc107;
            text-decoration: underline;
        }
       
    </style>
</head>
<body>
    <div class="header">
    <h1>CURRICULUM PLANNER</h1>
    </div>
   
    <div id="register-app"></div>
   
    {% csrf_token %}
   
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script type="text/javascript">
        const { createApp } = Vue;
       
        createApp({
            data() {
                return {
                    formData: {
                        username: '',
                        email: '',
                        password: '',
                        password2: ''
                    },
                    generalErrors: [],
                    fieldErrors: {},
                    successMessage: '',
                    isSubmitting: false
                }
            },
            template: `
                <div class="register-container">
                    <form @submit.prevent="handleSubmit" class="register-form">
                        <div class="logo-container" style="text-align: center; margin-bottom: 20px;">
                            <img src="{% static 'Castor_logo.png' %}" alt="Castor Logo" class="logo-image" style="width: 100px; height: auto;">
                        </div>
                        <h2  class="register-title">Create Account</h2>
                       <p class="register-subtitle">Join Curriculum Planner today! Please fill in the details below to create your account.</p>
                        <div class="form-group">
                            <label>Username</label>
                            <input v-model="formData.username" type="text" required minlength="3" maxlength="30"/>
                            <div v-if="fieldErrors.username" class="error">
                                <div v-for="(error, index) in fieldErrors.username" :key="'username-' + index" v-text="error"></div>
                            </div>
                        </div>
                       
                        <div class="form-group">
                            <label>Email</label>
                            <input v-model="formData.email" type="email" required minlength="4" maxlength="100"/>
                            <div v-if="fieldErrors.email" class="error">
                                <div v-for="(error, index) in fieldErrors.email" :key="'email-' + index" v-text="error"></div>
                            </div>
                        </div>
                       
                        <div class="form-group">
                            <label>Password</label>
                            <input v-model="formData.password" type="password" required minlength="3" maxlength="100" />
                            <div v-if="fieldErrors.password" class="error">
                                <div v-for="(error, index) in fieldErrors.password" :key="'password-' + index" v-text="error"></div>
                            </div>
                        </div>
                       
                        <div class="form-group">
                            <label>Repeat password</label>
                            <input v-model="formData.password2" type="password" required minlength="3" maxlength="100" />
                            <div v-if="fieldErrors.password2" class="error">
                                <div v-for="(error, index) in fieldErrors.password2" :key="'password2-' + index" v-text="error"></div>
                            </div>
                        </div>
                       
                        <button type="submit" :disabled="isSubmitting" class="register-btn">
                            <span v-if="isSubmitting">Creating Account...</span>
                            <span v-else>Register</span>
                        </button>
                       
                        <div v-if="generalErrors.length">
                            <p v-for="(error, index) in generalErrors" :key="'general-' + index" class="error" v-text="error"></p>
                        </div>
                       
                        <div v-if="successMessage" class="success">
                            {{ successMessage }}
                        </div>
                          <div class="login-link">
                                Already have an account? <a href="{% url 'login' %}">Login here</a>
                            </div>
                    </form>
                </div>
            `,
            methods: {
                async handleSubmit() {
                    this.clearMessages();
                    this.isSubmitting = true;
                
                    try {
                        const csrfToken = this.getCsrfToken();
                    
                        const response = await fetch('/accounts/register/', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': csrfToken
                            },
                            body: JSON.stringify(this.formData)
                        });
                    
                        const data = await response.json();
                    
                        console.log('Response status:', response.status);
                        console.log('Response data:', data);
                    
                        if (response.ok && data.success) {
                            this.successMessage = data.message || 'Registration successful!';
                            
                            // ✨ Sign in to Firebase with custom token
                            if (data.firebase_token) {
                                try {
                                    console.log('🔥 Authenticating with Firebase...');
                                    await firebase.auth().signInWithCustomToken(data.firebase_token);
                                    console.log('✅ Firebase authentication successful');
                                } catch (firebaseError) {
                                    console.error('⚠️ Firebase auth error:', firebaseError);
                                    // Continue even if Firebase fails
                                }
                            } else {
                                console.warn('⚠️ No Firebase token received from server');
                            }
                            
                            // Redirect after authentication
                            setTimeout(() => {
                                window.location.href = data.redirect_url || '/';
                            }, 1500);
                        } else {
                            console.log('Handling errors - field_errors:', data.field_errors);
                            console.log('Handling errors - errors:', data.errors);
                            
                            if (data.field_errors) {
                                this.fieldErrors = data.field_errors;
                                console.log('Set fieldErrors to:', this.fieldErrors);
                            }
                            if (data.errors) {
                                this.generalErrors = Array.isArray(data.errors) ? data.errors : [data.errors];
                                console.log('Set generalErrors to:', this.generalErrors);
                            }
                        }
                    } catch (error) {
                        console.error('❌ Error:', error);
                        this.generalErrors = ['Network error occurred. Please try again.'];
                    } finally {
                        this.isSubmitting = false;
                    }
                },
                
               
                clearMessages() {
                    this.generalErrors = [];
                    this.fieldErrors = {};
                    this.successMessage = '';
                },
               
                getCsrfToken() {
                    function getCookie(name) {
                        let cookieValue = null;
                        if (document.cookie && document.cookie !== '') {
                            const cookies = document.cookie.split(';');
                            for (let i = 0; i < cookies.length; i++) {
                                const cookie = cookies[i].trim();
                                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                                    break;
                                }
                            }
                        }
                        return cookieValue;
                    }
                    return getCookie('csrftoken');
                }
            }
        }).mount('#register-app');
    </script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

}
</script>
</body>
</html>
