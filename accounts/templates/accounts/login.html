{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login - Curriculum Planner</title>
    <meta name="csrf-token" content="{{ csrf_token }}">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0d1f3d 0%, #1a3a6b 25%, #2c5aa0 50%, #3d6db8 75%, #4a7ec7 100%);
            min-height: 100vh;
            color: #333;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Advanced animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 15% 20%, rgba(255, 193, 7, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(255, 193, 7, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.08) 0%, transparent 50%);
            pointer-events: none;
            animation: particleFloat 25s ease-in-out infinite;
        }
        
        @keyframes particleFloat {
            0%, 100% { 
                transform: translateY(0) scale(1); 
                opacity: 1;
            }
            50% { 
                transform: translateY(-20px) scale(1.02); 
                opacity: 0.95;
            }
        }
        
        .header {
            background: linear-gradient(135deg, #2c5aa0 0%, #1a3a6b 50%, #0d1f3d 100%);
            color: white;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
            border-bottom: 3px solid rgba(255, 193, 7, 0.3);
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 193, 7, 0.3), transparent);
            animation: shimmer 4s infinite;
        }
        
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 800;
            text-shadow: 
                2px 2px 4px rgba(0,0,0,0.3),
                0 0 20px rgba(255, 193, 7, 0.4);
            position: relative;
            z-index: 1;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #ffffff 0%, #ffc107 50%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 4s linear infinite;
        }
        
        @keyframes textShine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px);
            padding: 40px 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            padding: 60px 50px;
            width: 100%;
            max-width: 500px;
            box-shadow: 
                0 20px 80px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            animation: slideUp 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            background: linear-gradient(45deg, 
                #2c5aa0, #ffc107, #2c5aa0, #ffc107);
            border-radius: 40px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
        }

        .login-card:hover::before {
            opacity: 0.7;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Logo Section */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-image {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.2));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-title {
            background: linear-gradient(135deg, #2c5aa0 0%, #1a3a6b 30%, #2c5aa0 60%, #ffc107 80%, #2c5aa0 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2rem;
            font-weight: 900;
            margin: 20px 0 10px;
            animation: titleShine 5s linear infinite;
            letter-spacing: 0.5px;
            text-align: center;
        }

        @keyframes titleShine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .login-subtitle {
            color: #555;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
            color: #2c5aa0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 16px 20px;
            border: 3px solid #e1e8ed;
            border-radius: 15px;
            font-size: 1rem;
            background: #e8f0fe;
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #2c5aa0;
            box-shadow: 0 0 0 5px rgba(44, 90, 160, 0.15);
            transform: translateY(-2px);
        }

        .error-message {
            background: linear-gradient(135deg, #fee 0%, #fdd 100%);
            color: #c41e3a;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            border: 2px solid rgba(196, 30, 58, 0.3);
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 18px 50px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #2c5aa0 0%, #1a3a6b 50%, #0d1f3d 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(44, 90, 160, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            margin-top: 10px;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }

        .login-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .login-btn:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 40px rgba(44, 90, 160, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .login-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .login-btn:disabled:hover {
            transform: none;
        }

        /* Additional Links */
        .additional-links {
            margin-top: 20px;
            text-align: center;
        }

        .additional-links a {
            color: #2c5aa0;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .additional-links a:hover {
            color: #ffc107;
            text-decoration: underline;
        }

        .divider {
            margin: 25px 0;
            text-align: center;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e1e8ed, transparent);
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #888;
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #555;
            font-size: 0.95rem;
        }

        .register-link a {
            color: #2c5aa0;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .register-link a:hover {
            color: #ffc107;
            text-decoration: underline;
        }


        .forgot-password-link {
            text-align: center;
            margin-top: 20px;
            color: #555;
            font-size: 0.95rem;
        }

       .forgot-password-link a {
            color: #2c5aa0;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .forgot-password-link a:hover {
            color: #ffc107;
            text-decoration: underline;
            cursor: pointer;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            border-radius: 25px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 800;
            color: #2c5aa0;
            margin-bottom: 10px;
        }

        .modal-description {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .modal-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .modal-input:focus {
            border-color: #2c5aa0;
            box-shadow: 0 0 0 5px rgba(44, 90, 160, 0.15);
            outline: none;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .modal-btn-primary {
            background: linear-gradient(135deg, #2c5aa0, #1a3a6b);
            color: white;
            box-shadow: 0 4px 15px rgba(44, 90, 160, 0.4);
        }

        .modal-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44, 90, 160, 0.5);
        }

        .modal-btn-primary:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }

        .modal-btn-secondary {
            background: #e9ecef;
            color: #333;
        }

        .modal-btn-secondary:hover {
            background: #d3d6da;
        }

        .modal-success {
            color: #28a745;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .modal-error {
            color: #dc3545;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 20px 25px;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }

            .login-card {
                padding: 40px 30px;
                border-radius: 30px;
            }

            .login-title {
                font-size: 1.5rem;
            }

            .logo-image {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>CURRICULUM PLANNER</h1>
    </div>

    <div id="login-app"></div>
    {% csrf_token %}

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script type="text/javascript">
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    formData: {
                        username: '',
                        password: ''
                    },
                    errorMessage: '',
                    isSubmitting: false,
                    showResetModal: false,
                    resetEmail: '',
                    resetMessage: '',
                    resetError: '',
                    isResetting: false
                }
            },
            template: `
                <div class="login-container">
                    <div class="login-card">
                        <div class="logo-container">
                            <img src="{% static 'Castor_logo.png' %}" alt="Castor Logo" class="logo-image">
                        </div>
                        
                        <h2 class="login-title">SIGN IN</h2>
                        <p class="login-subtitle">Welcome Student! Please login to your account.</p>
                        
                        <form @submit.prevent="handleSubmit">
                            <div v-if="errorMessage" class="error-message" v-text="errorMessage"></div>
                            
                            <div class="form-group">
                                <label>USERNAME</label>
                                <input 
                                    v-model="formData.username" 
                                    type="text" 
                                    placeholder="example_admin@email.4" 
                                    required
                                    minlength="3"
                                    maxlength="100"
                                />  
                            </div>
                            
                            <div class="form-group">  
                                <label>PASSWORD</label>
                                <input 
                                    v-model="formData.password" 
                                    type="password" 
                                    placeholder="Type your password here" 
                                    required
                                    minlength="3"
                                    maxlength="100"
                                />
                            </div>
                            
                            <button type="submit" :disabled="isSubmitting" class="login-btn">
                                <span v-if="isSubmitting">Logging in...</span>
                                <span v-else>LOGIN</span>
                            </button>
                            
                            <div class="divider">
                                <span>OR</span>
                            </div>
                            
                            <div class="register-link">
                                Don't have an account? <a href="{% url 'register' %}">Register here</a>
                            </div>
                            <div class="forgot-password-link">
                                <a @click="openResetModal" style="cursor: pointer;">Forgot Password?</a>
                            </div>
                        </form>
                    </div>
                </div>
                
                <!-- Password Reset Modal -->
                <div v-if="showResetModal" class="modal-overlay" @click.self="closeResetModal">
                    <div class="modal-content">
                        <div class="modal-header">Reset Your Password</div>
                        <div class="modal-description">
                            Enter your email address and we'll send you a link to reset your password.
                        </div>
                        
                        <div v-if="resetMessage" class="modal-success">{{ resetMessage }}</div>
                        <div v-if="resetError" class="modal-error">{{ resetError }}</div>
                        
                        <input 
                            v-model="resetEmail" 
                            type="email" 
                            class="modal-input" 
                            placeholder="Enter your email address"
                            @keyup.enter="handlePasswordReset"
                            :disabled="isResetting"
                        />
                        
                        <div class="modal-buttons">
                            <button @click="closeResetModal" class="modal-btn modal-btn-secondary" :disabled="isResetting">
                                Cancel
                            </button>
                            <button @click="handlePasswordReset" class="modal-btn modal-btn-primary" :disabled="isResetting || !resetEmail">
                                <span v-if="isResetting">Sending...</span>
                                <span v-else>Send Reset Link</span>
                            </button>
                        </div>
                    </div>
                </div>
                        </form>
                    </div>
                </div>
            `,
            methods: {   
                async handleSubmit() {
                        this.errorMessage = '';
                        this.isSubmitting = true;
                        
                        try {
                            const response = await fetch("{% url 'login' %}", {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'X-CSRFToken': this.getCSRFToken()
                                },
                                body: JSON.stringify(this.formData)
                            });
                            
                            const data = await response.json();
                            
                            if (response.ok && data.success) {
                                // ✨ Sign in to Firebase with custom token
                                if (data.firebase_token) {
                                    try {
                                        console.log('🔥 Authenticating with Firebase...');
                                        await firebase.auth().signInWithCustomToken(data.firebase_token);
                                        console.log('✅ Firebase authentication successful');
                                    } catch (firebaseError) {
                                        console.error('⚠️ Firebase auth error:', firebaseError);
                                        // Continue even if Firebase fails
                                    }
                                } else {
                                    console.warn('⚠️ No Firebase token received from server');
                                }
                                
                                // Redirect after authentication
                                window.location.href = data.redirect_url;
                            } else {
                                // Generic error message for security - don't reveal which field is wrong
                                this.errorMessage = 'Invalid credentials. The username or password you entered does not match our records.';
                            }
                        } catch (error) {
                            console.error('❌ Error:', error);
                            this.errorMessage = 'An error occurred. Please try again.';
                        } finally {
                            this.isSubmitting = false;
                        }
                    },
                getCSRFToken() {
                    const getCookie = (name) => {
                        let cookieValue = null;
                        if (document.cookie && document.cookie !== '') {
                            const cookies = document.cookie.split(';');
                            for (let i = 0; i < cookies.length; i++) {
                                const cookie = cookies[i].trim();
                                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                                    break;
                                }
                            }
                        }
                        return cookieValue;
                    };
                    return getCookie('csrftoken');
                },
                openResetModal() {
                    this.showResetModal = true;
                    this.resetEmail = '';
                    this.resetMessage = '';
                    this.resetError = '';
                },
                closeResetModal() {
                    this.showResetModal = false;
                    this.resetEmail = '';
                    this.resetMessage = '';
                    this.resetError = '';
                    this.isResetting = false;
                },
                async handlePasswordReset() {
                    if (!this.resetEmail) {
                        this.resetError = 'Please enter your email address.';
                        return;
                    }
                    
                    this.resetError = '';
                    this.resetMessage = '';
                    this.isResetting = true;
                    
                    try {
                        const response = await fetch('/accounts/api/password-reset/', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken': this.getCSRFToken()
                            },
                            body: JSON.stringify({ email: this.resetEmail })
                        });
                        
                        const data = await response.json();
                        
                        if (response.ok && data.success) {
                            this.resetMessage = data.message;
                            setTimeout(() => {
                                this.closeResetModal();
                            }, 3000);
                        } else {
                            this.resetError = data.error || 'Failed to send reset email. Please try again.';
                        }
                    } catch (error) {
                        console.error('Error:', error);
                        this.resetError = 'An error occurred. Please try again.';
                    } finally {
                        this.isResetting = false;
                    }
                }
            }
        }).mount('#login-app');
    </script>

    <!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
